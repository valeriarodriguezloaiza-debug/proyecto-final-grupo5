<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo 5 - Infraestructura Cloud</title>
    <style>
        :root {
            --primary: #1b2a4a;     /* Azul cobalto profundo */
            --secondary: #2c3b59;   /* Azul pizarra */
            --accent: #00a8cc;      /* Cian técnico */
            --success: #2ecc71;     /* Verde de verificación */
            --text: #2c3e50;        /* Texto oscuro legible */
            --bg: #f4f7f6;          /* Fondo gris claro limpio */
            --card-bg: #ffffff;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 0; 
            background: var(--bg); 
            color: var(--text); 
        }
        
        header { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            padding: 45px 20px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(27, 42, 74, 0.15);
        }
        
        header h1 { margin: 0; font-size: 2.6em; font-weight: 700; letter-spacing: -0.5px; }
        header p { margin: 10px 0 0 0; font-size: 1.2em; opacity: 0.9; }
        
        nav { 
            background: var(--primary); 
            padding: 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        nav a { 
            color: rgba(255,255,255,0.85); 
            display: inline-block;
            padding: 16px 18px;
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.95em;
            transition: all 0.25s ease;
        }
        
        nav a:hover { color: white; background: var(--accent); }
        
        .container { max-width: 1150px; margin: 40px auto; padding: 0 20px; }
        
        .card { 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 10px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 35px;
            border-top: 4px solid var(--secondary);
        }
        
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-top: 0; font-size: 1.75em; }
        h3 { color: var(--secondary); margin-top: 25px; font-size: 1.3em; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        th, td { padding: 14px 18px; text-align: left; }
        th { background: var(--primary); color: white; font-weight: 600; font-size: 0.95em; }
        td { border-bottom: 1px solid #eef2f5; font-size: 0.95em; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background: #f9fbfb; }
        
        .badge { color: white; padding: 4px 12px; border-radius: 4px; font-size: 0.78em; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-g5 { background: var(--accent); font-size: 0.85em; padding: 6px 16px; border-radius: 20px; }
